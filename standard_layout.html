<div class="sidebar" id="sidebar" onclick="event.stopPropagation()">
  <img
    class="main-logo-sidabar display-none"
    src="./assets/icons/main_logo_light.png"
    alt=""
  />
  <div class="sidebar-content">
    <div class="menu-items" id="navigation-items">

    </div>

    <div class="menu-items legal-mobile" id="privacy-legal">
      <a
        class="blue-hover"
        id="privacy_policy"
        onclick="
          (loadHtmlPage('content', './footerpages/privacy_policy.html'),
            toggleIsActive('privacy_policy'))
        "
        >Privacy Policy</a
      >
      <a
        class="blue-hover"
        id="legal_notice"
        onclick="
          (loadHtmlPage('content', './footerpages/legal_notice.html'),
            toggleIsActive('legal_notice'))
        "
        >Legal notice</a
      >
    </div>
  </div>
</div>

<div class="main-area">
  <div class="header-page" id="header">
    
    <div class="header">
    <p class="display-none">Kanban Project Management Tool</p>
    <img
      class="desktop-dysplay-none mobile-main-img"
      src="./assets/icons/main_logo_dark.png"
      alt=""
    />
    <div class="help-and-logout" id="help-and-logout"></div>
    

    <div class="header-menu-hide" id="header-menu">
      <div class="desktop-dysplay-none">
        <a
          onclick="
            loadHtmlPage('content', './footerpages/help.html'),
              openCloseHeaderMenu(),
              toggleIsActive('privacy_policy')
          "
          >Help</a
        >
      </div>
      <a
        onclick="
          loadHtmlPage('content', './footerpages/legal_notice.html'),
            openCloseHeaderMenu(),
            toggleIsActive('legal_notice')
        "
        >Legal Notice</a
      >
      <a
        onclick="
          loadHtmlPage('content', './footerpages/privacy_policy.html'),
            openCloseHeaderMenu(),
            toggleIsActive('privacy_policy')
        "
        >Privacy Policy</a
      >
      <a onclick="(logOut(), openCloseHeaderMenu())">Log out</a>
    </div>
    
  </div>
  </div>
  <div class="page-content" id="content"></div>
</div>

<div id="add-task-overlay" class="add-task-overlay d-none" onclick="closeOverlay('add-task')">
  <div id="add-task-dialog" class="add-task-dialog" onclick="stopEventBubbling(event), closeAssignedDropdown(), closeCategoryDropdown(), hideSubtaskInputButtons()">
    <!-- The add task dialog will be loaded here dynamically -->
  </div>
</div>

<div id="task-overlay" class="task-overlay d-none" onclick="closeOverlay('task')">
  <div id="task-dialog" class="task-dialog" onclick="stopEventBubbling(event)">
    <!-- The task dialog will be loaded here dynamically -->
  </div>
</div>
<div id="edit-overlay" class="task-overlay d-none" onclick="closeOverlay('edit')">
  <div id="edit-dialog" class="edit-task-dialog" onclick="stopEventBubbling(event)">
    <!-- The edit task dialog will be loaded here dynamically -->
  </div>
</div>
